<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Бутербродная — карточная игра</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior: none; }
    body { background: #1a3a0a; color: #fff; display: flex; align-items: flex-start; justify-content: center; padding: 8px; }
    #app { width: 100%; max-width: 420px; min-height: 100vh; display: flex; flex-direction: column; }

    .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; min-height: 96vh; padding: 24px; text-align: center; }
    .screen h1 { font-size: 36px; color: #ffd700; }
    .screen h2 { font-size: 22px; color: #fff; }

    .btn { background: #4CAF50; color: #fff; border: none; padding: 14px 28px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; min-width: 200px; touch-action: manipulation; }
    .btn:active { transform: scale(0.97); }
    .btn.secondary { background: #555; }
    .btn.danger { background: #e74c3c; }

    .count-row { display: flex; gap: 12px; }
    .count-btn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #4CAF50; background: transparent; color: #fff; font-size: 22px; font-weight: 700; cursor: pointer; touch-action: manipulation; }
    .count-btn.active { background: #4CAF50; }
    .names-col { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }
    .name-input { padding: 12px 16px; border-radius: 10px; border: 2px solid #4CAF50; background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; }
    .name-input:focus { outline: none; border-color: #ffd700; }

    .play-table { display: flex; flex-direction: column; gap: 12px; padding: 12px; background: #2d5a1b; border-radius: 16px; min-height: 96vh; }
    .opps { display: flex; justify-content: space-around; gap: 8px; flex-wrap: wrap; }
    .opp { text-align: center; }
    .opp-name { font-size: 11px; color: #a8d5a2; margin-bottom: 4px; }
    .opp-cards { display: flex; gap: 2px; justify-content: center; flex-wrap: nowrap; }
    .card-back-mini { width: 20px; height: 28px; background: url('card-back.svg') center/cover; border-radius: 4px; flex-shrink: 0; }
    .card-back-big  { width: 80px; height: 114px; background: url('card-back.svg') center/cover; border-radius: 10px; box-shadow: 2px 2px 10px rgba(0,0,0,0.4); }
    .center { display: flex; justify-content: center; gap: 28px; padding: 18px 0; }
    .top-card { width: 100px; height: 142px; border-radius: 12px; object-fit: cover; border: 3px solid #ffd700; box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
    .lbl { font-size: 10px; color: #a8d5a2; text-align: center; margin-top: 4px; }
    .lbl.gold { color: #ffd700; }
    .turn-badge { background: rgba(255,255,255,0.15); padding: 8px; border-radius: 10px; text-align: center; font-size: 13px; font-weight: 700; }
    .message { background: #ffd700; color: #2d5a1b; padding: 10px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 13px; }

    .hand { display: flex; gap: 6px; justify-content: flex-start; flex-wrap: nowrap; padding: 8px 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .hand::-webkit-scrollbar { display: none; }
    .hand-card { width: 76px; height: 108px; flex-shrink: 0; border-radius: 10px; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); cursor: pointer; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s; touch-action: manipulation; }
    .hand-card.selected { transform: translateY(-16px); border-color: #ffd700; box-shadow: 0 0 14px rgba(255,215,0,0.8); }
    .hand-card.danger { border-color: #e74c3c; box-shadow: 0 0 10px rgba(231,76,60,0.6); }
    .hand-card.selected.danger { border-color: #e74c3c; box-shadow: 0 0 16px rgba(231,76,60,1); transform: translateY(-16px); }
    .action-bar { display: flex; gap: 10px; justify-content: center; padding: 10px 0; flex-wrap: nowrap; }
    .action-bar .btn { min-width: 0; flex: 1; max-width: 200px; padding: 14px 16px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
    .modal { background: #2d5a1b; padding: 24px; border-radius: 16px; max-width: 320px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .modal h3 { color: #ffd700; margin-bottom: 16px; text-align: center; }
    .target-grid { display: flex; flex-direction: column; gap: 10px; }
    .target-btn { padding: 14px; border-radius: 10px; border: 2px solid #4CAF50; background: rgba(255,255,255,0.1); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; touch-action: manipulation; }
    .target-btn:active { background: #4CAF50; }
    .target-btn small { font-size: 11px; color: #a8d5a2; font-weight: normal; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .screen, .play-table { animation: fadeIn 0.25s ease; }
    .modal { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    'use strict';

    const CARDS = {
      baton:   { id: 'baton',   name: 'Батон',       img: 'cards/baton.jpg',   copies: 5 },
      brat:    { id: 'brat',    name: 'Брат батона', img: 'cards/brat.jpg',    copies: 5 },
      yayko:   { id: 'yayko',   name: 'Яйко',        img: 'cards/yayko.jpg',   copies: 5 },
      ketchup: { id: 'ketchup', name: 'Кетчуп',      img: 'cards/ketchup.jpg', copies: 5 },
      maslen:  { id: 'maslen',  name: 'Маслён',      img: 'cards/maslen.jpg',  copies: 5 },
      listok:  { id: 'listok',  name: 'Листок',      img: 'cards/listok.jpg',  copies: 5 },
      syrok:   { id: 'syrok',   name: 'Сырок',       img: 'cards/syrok.jpg',   copies: 5 },
      pome:    { id: 'pome',    name: 'Поме',        img: 'cards/pome.jpg',    copies: 5 },
    };

    const KETCHUP_ALLOWED_ON = new Set(['baton', 'syrok', 'pome']);
    const MASLEN_ALLOWED_ON  = new Set(['baton']);

    function buildDeck() {
      const deck = [];
      for (const id in CARDS) for (let i = 0; i < CARDS[id].copies; i++) deck.push(id);
      return deck;
    }
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const state = {
      phase: 'menu', players: [], deck: [], discard: [],
      currentPlayer: 0, selectedCard: null, pickingTarget: false,
      winner: null, winReason: '', message: '',
      setupPlayerCount: 2,
      setupNames: ['Игрок 1', 'Игрок 2', 'Игрок 3', 'Игрок 4'],
    };
    function resetState() {
      Object.assign(state, {
        phase: 'menu', players: [], deck: [], discard: [],
        currentPlayer: 0, selectedCard: null, pickingTarget: false,
        winner: null, winReason: '', message: '',
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function isDangerCard(cardId, topCardId) {
      if (cardId === 'ketchup') return !KETCHUP_ALLOWED_ON.has(topCardId);
      if (cardId === 'maslen')  return !MASLEN_ALLOWED_ON.has(topCardId);
      return false;
    }

    function dealNewGame() {
      state.deck = shuffle(buildDeck());
      const idxBaton = state.deck.indexOf('baton');
      state.discard = [state.deck.splice(idxBaton, 1)[0]];
      for (const p of state.players) {
        p.hand = state.deck.splice(0, 5);
        p.eliminated = false;
        p.frozen = false;
      }
      state.selectedCard = null;
      state.pickingTarget = false;
      state.winner = null;
      state.winReason = '';
      state.message = '';
    }

    function reshuffleIfNeeded() {
      if (state.deck.length > 0) return;
      if (state.discard.length <= 1) return;
      const top = state.discard.pop();
      state.deck = shuffle(state.discard);
      state.discard = [top];
    }
    function advanceTurn() {
      const n = state.players.length;
      let next = (state.currentPlayer + 1) % n;
      for (let s = 0; s < n * 2; s++) {
        const p = state.players[next];
        if (p.eliminated) { next = (next + 1) % n; continue; }
        if (p.frozen) { p.frozen = false; next = (next + 1) % n; continue; }
        break;
      }
      state.currentPlayer = next;
      state.phase = 'pass';
    }
    function applyYaykoFreeze(targetIdx) {
      state.players[targetIdx].frozen = true;
      state.message = `${state.players[targetIdx].name} заморожен Яйком — пропускает ход!`;
    }
    function doWin(playerIdx, reason) {
      state.winner = playerIdx;
      state.winReason = reason;
      state.phase = 'gameover';
      render();
    }
    function doEliminate(msg) {
      const me = state.players[state.currentPlayer];
      me.eliminated = true;
      state.discard = state.discard.concat(me.hand);
      me.hand = [];
      state.selectedCard = null;
      state.message = msg;
      const alive = state.players.filter(p => !p.eliminated);
      if (alive.length === 1) {
        return doWin(state.players.indexOf(alive[0]), `${alive[0].name} — последний выживший!`);
      }
      advanceTurn();
      render();
    }

    function action_goSetup() { state.phase = 'setup'; render(); }
    function action_setCount(n) { state.setupPlayerCount = n; render(); }
    function action_startGame() {
      const count = state.setupPlayerCount || 2;
      state.players = [];
      for (let i = 0; i < count; i++) {
        const raw = (state.setupNames[i] || '').trim();
        state.players.push({ name: raw || `Игрок ${i+1}`, hand: [], eliminated: false, frozen: false });
      }
      dealNewGame();
      state.currentPlayer = Math.floor(Math.random() * count);
      state.phase = 'pass';
      render();
    }
    function action_ready() { state.message = ''; state.phase = 'play'; render(); }
    function action_selectCard(idx) {
      state.selectedCard = idx;
      render();
      requestAnimationFrame(() => {
        const el = document.querySelector('.hand-card.selected');
        if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      });
    }
    function action_deselectCard() { state.selectedCard = null; render(); }
    function action_drawCard() {
      reshuffleIfNeeded();
      if (state.deck.length === 0) state.message = 'Колода и сброс пусты — ход переходит.';
      else state.players[state.currentPlayer].hand.push(state.deck.shift());
      state.selectedCard = null;
      advanceTurn();
      render();
    }
    function action_playSelected() {
      const idx = state.selectedCard;
      if (idx === null) return;
      const me = state.players[state.currentPlayer];
      const cardId = me.hand[idx];
      const topCard = state.discard[state.discard.length - 1];
      if (cardId === 'ketchup' && !KETCHUP_ALLOWED_ON.has(topCard)) {
        return doEliminate(`${me.name} сыграл Кетчуп на ${CARDS[topCard].name} — вылет!`);
      }
      if (cardId === 'maslen' && !MASLEN_ALLOWED_ON.has(topCard)) {
        return doEliminate(`${me.name} сыграл Маслён на ${CARDS[topCard].name} — вылет!`);
      }
      me.hand.splice(idx, 1);
      state.discard.push(cardId);
      state.selectedCard = null;
      if (cardId === 'brat') return doWin(state.currentPlayer, `${me.name} сыграл Брат батона — победа!`);
      if (me.hand.length === 0) return doWin(state.currentPlayer, `${me.name} сбросил последнюю карту!`);
      if (cardId === 'yayko') {
        const targets = state.players.map((p, i) => ({ p, i })).filter(x => x.i !== state.currentPlayer && !x.p.eliminated);
        if (targets.length === 1) { applyYaykoFreeze(targets[0].i); render(); }
        else if (targets.length === 0) { render(); }
        else { state.pickingTarget = true; render(); }
        return;
      }
      advanceTurn();
      render();
    }
    function action_pickTarget(idx) {
      applyYaykoFreeze(idx);
      state.pickingTarget = false;
      render();
    }
    function action_newGame() { resetState(); render(); }

    function render() {
      const app = document.getElementById('app');
      switch (state.phase) {
        case 'menu':     app.innerHTML = renderMenu();     break;
        case 'setup':    app.innerHTML = renderSetup();    break;
        case 'pass':     app.innerHTML = renderPass();     break;
        case 'play':     app.innerHTML = renderPlay();     break;
        case 'gameover': app.innerHTML = renderGameover(); break;
      }
    }
    function renderMenu() {
      return `
        <div class="screen">
          <div style="font-size:72px">🥪</div>
          <h1>Бутербродная</h1>
          <p style="color:#a8d5a2;max-width:280px;font-size:14px;line-height:1.5">Карточная игра на 2–4 игрока. Передавайте телефон по кругу.</p>
          <button class="btn" onclick="action_goSetup()">Новая игра</button>
        </div>
      `;
    }
    function renderSetup() {
      const count = state.setupPlayerCount;
      const inputs = [];
      for (let i = 0; i < count; i++) {
        inputs.push(`<input class="name-input" type="text" value="${escapeHtml(state.setupNames[i])}" oninput="state.setupNames[${i}] = this.value" maxlength="20" placeholder="Имя игрока ${i+1}">`);
      }
      return `
        <div class="screen">
          <h2>Сколько игроков?</h2>
          <div class="count-row">
            ${[2,3,4].map(n => `<button class="count-btn ${n===count?'active':''}" onclick="action_setCount(${n})">${n}</button>`).join('')}
          </div>
          <div class="names-col">${inputs.join('')}</div>
          <button class="btn" onclick="action_startGame()">Начать</button>
          <button class="btn secondary" onclick="action_newGame()">← Назад</button>
        </div>
      `;
    }
    function renderPass() {
      const me = state.players[state.currentPlayer];
      const carry = state.message ? `<div class="message">${escapeHtml(state.message)}</div>` : '';
      return `
        <div class="screen">
          ${carry}
          <div style="font-size:64px">📱</div>
          <h2>Передай телефон</h2>
          <p style="color:#a8d5a2;font-size:16px">${escapeHtml(me.name)}, твой ход!</p>
          <p style="font-size:12px;color:#888">У тебя ${me.hand.length} карт</p>
          <button class="btn" onclick="action_ready()">Я готов →</button>
        </div>
      `;
    }
    function renderPlay() {
      const me = state.players[state.currentPlayer];
      const topCard = state.discard[state.discard.length - 1];
      const opponents = state.players.map((p, i) => ({ p, i })).filter(x => x.i !== state.currentPlayer && !x.p.eliminated);
      const oppHtml = opponents.map(({ p }) => `
        <div class="opp">
          <div class="opp-name">${escapeHtml(p.name)} · ${p.hand.length}🃏</div>
          <div class="opp-cards">${p.hand.map(() => `<div class="card-back-mini"></div>`).join('')}</div>
        </div>
      `).join('');
      const handHtml = me.hand.map((cid, idx) => `
        <img src="${CARDS[cid].img}"
             class="hand-card ${state.selectedCard === idx ? 'selected' : ''} ${isDangerCard(cid, topCard) ? 'danger' : ''}"
             alt="${CARDS[cid].name}"
             onclick="action_selectCard(${idx})">
      `).join('');
      const selectedCardId = state.selectedCard !== null ? me.hand[state.selectedCard] : null;
      const isDangerous = selectedCardId && isDangerCard(selectedCardId, topCard);
      const actionBar = state.selectedCard !== null
        ? `<div class="action-bar">
             <button class="btn secondary" onclick="action_deselectCard()">Отмена</button>
             <button class="btn ${isDangerous ? 'danger' : ''}" onclick="action_playSelected()">${isDangerous ? '⚠️ Сыграть всё равно' : 'Сыграть'}</button>
           </div>`
        : `<div class="action-bar"><button class="btn secondary" onclick="action_drawCard()">Взять карту (${state.deck.length})</button></div>`;
      const targetPicker = state.pickingTarget ? renderTargetPicker() : '';
      return `
        <div class="play-table">
          <div class="opps">${oppHtml}</div>
          <div class="center">
            <div><div class="card-back-big"></div><div class="lbl">Колода · ${state.deck.length}</div></div>
            <div><img src="${CARDS[topCard].img}" class="top-card" alt="${CARDS[topCard].name}"><div class="lbl gold">На столе</div></div>
          </div>
          <div class="turn-badge">⭐ Ход: ${escapeHtml(me.name)}</div>
          ${state.message ? `<div class="message">${escapeHtml(state.message)}</div>` : ''}
          <div class="hand">${handHtml}</div>
          ${actionBar}
        </div>
        ${targetPicker}
      `;
    }
    function renderTargetPicker() {
      const targets = state.players.map((p, i) => ({ p, i })).filter(x => x.i !== state.currentPlayer && !x.p.eliminated);
      const btns = targets.map(({ p, i }) => `
        <button class="target-btn" onclick="action_pickTarget(${i})">${escapeHtml(p.name)}<br><small>${p.hand.length}🃏</small></button>
      `).join('');
      return `<div class="modal-overlay"><div class="modal"><h3>🍳 На кого бросить Яйко?</h3><div class="target-grid">${btns}</div></div></div>`;
    }
    function renderGameover() {
      const winner = state.players[state.winner];
      return `
        <div class="screen">
          <div style="font-size:72px">🏆</div>
          <h1 style="color:#ffd700">${escapeHtml(winner.name)}</h1>
          <p style="font-size:14px;color:#a8d5a2;max-width:280px;line-height:1.5">${escapeHtml(state.winReason)}</p>
          <button class="btn" onclick="action_newGame()">Ещё раз</button>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
